# Coolify deployment — pulls the pre-built image from GHCR (no build).
#
# This file is tailored for Coolify's "magic" environment variables:
#   - SERVICE_FQDN_IMPERSONATE_8080  → Coolify generates a domain + TLS and routes
#     it to the container's port 8080.
#   - SERVICE_PASSWORD_64_ADMIN / SERVICE_PASSWORD_64_APITOKEN  → Coolify generates
#     two 64-char secrets ONCE on the first deploy and persists them.
#
# After the first deploy, open the service's "Environment Variables" tab in
# Coolify to reveal/copy the generated ADMIN_TOKEN (admin UI password) and TOKEN
# (your first API token, already seeded into the datastore).
#
# How to use: New Resource → Docker Compose → point at this repo and this file.
# Nothing else to fill in — deploy and go.

services:
  impersonate-service:
    image: ghcr.io/zupolgec/curl-impersonate-service:latest
    restart: unless-stopped
    environment:
      # Coolify generates the public domain and routes it to port 8080.
      - SERVICE_FQDN_IMPERSONATE_8080
      # Auto-generated secrets (revealed in Coolify's env tab after first deploy).
      - ADMIN_TOKEN=${SERVICE_PASSWORD_64_ADMIN}
      - TOKEN=${SERVICE_PASSWORD_64_APITOKEN}
      # Tunables (override in the Coolify UI if needed).
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_RETENTION_HOURS=${LOG_RETENTION_HOURS:-72}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      # SSRF defaults are strict (https-only, no raw IPs). Uncomment to relax:
      # - SSRF_ALLOW_HTTP=true
      # - SSRF_ALLOW_IP=true
      # - SSRF_ALLOW_PRIVATE=true
      - DATA_DIR=/data
    volumes:
      # Persists tokens, CORS settings and usage logs across redeploys — keep it.
      - impersonate-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  impersonate-data:
